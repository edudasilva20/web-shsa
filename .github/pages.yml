name: Deploy Pages (web/)
on:
  push:
    branches: [ main ]   # corre sempre que fizeres push para a branch main
  workflow_dispatch:     # permite correr manualmente (botão "Run workflow")

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar site (copiar pasta web/)
        run: |
          mkdir -p ./_site
          cp -r web/* ./_site/
      - name: Fazer upload do artefacto do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
